# Fashion-MNIST, ECF defense vs backdoor — single-GPU reference config
dataset: fmnist          # synthetic | fmnist | cifar10 | tabular
model: small_cnn         # small_cnn | resnet9 | mlp
root: ./data
seed: 0
device: cuda             # cuda | cpu

num_clients: 20
clients_per_round: 20    # full participation (cross-silo)
rounds: 60
local_epochs: 1
lr: 0.01
batch_size: 64
alpha: 0.5               # Dirichlet non-IID (0.1 = more skewed)

attack: backdoor         # label_flip | backdoor | sign_flip | gaussian | lie | min_max
num_malicious: 4
target_label: 0
trigger_size: 3

defense: ecf             # fedavg | trimmed_mean | median | multi_krum | fltrust | ecf
defense_kw:
  tau: 0.5
  mode: soft             # soft | hard | hard_gate | round_gate
                         # round_gate: round-level attack detection for intermittent
                         #   attackers — clean round -> uniform-average everyone (uses
                         #   resting attackers' honest updates); attacked round -> hard-
                         #   drop suspicious + uniform survivors. Pairs with attack_prob.
  consensus: geomedian   # geomedian | coordmedian | mean
  norm_gate: true
  kappa: 2.5             # hard_gate: robust z-score gate; drop clients with z>kappa
                         #            (capped at num_malicious) -> reject only when
                         #            detection confidence is large, else stay soft

# ECF attribution
attribution: grad_x_input   # grad_x_input | integrated_gradients
ig_steps: 16
probe_size: 64
root_size: 100

# ECF probe construction. strategy: clean (untouched, blind to dormant attacks) |
# oracle (stamp the KNOWN trigger -- diagnostic upper bound) | candidate
# (reverse-engineer a trigger from the global model, Neural-Cleanse-lite --
# realistic) | perturb (generic attack-agnostic noise/patch). mode: triggered
# (replace clean probe) | both (concatenate clean + activated probe).
probe:
  strategy: clean        # clean | oracle | candidate | perturb
  mode: triggered        # triggered | both
  candidate:             # used when strategy=candidate
    steps: 150
    lr: 0.1
    lambda: 0.01         # L1 sparsity on the recovered mask/delta
    scan_targets: false  # true = scan all classes, pick the smallest-mask (true NC)
  perturb:               # used when strategy=perturb
    kind: patch          # patch | noise
    strength: 1.0
    size: 3              # patch side (image)
    seed: 0
